# nginx server for the `static` site (see Dockerfile). Replaces the stock
# default.conf. This serves whatever files live under public/ — drop an HTML
# file in there, redeploy, and it's live at https://static.mseeks.me/<file>.
#
# There is no build step and no SPA routing: a request maps directly to a file
# on disk. The root "/" auto-lists everything published (autoindex) so you never
# have to hand-maintain an index — unless you drop your own public/index.html,
# which nginx will serve in preference to the listing.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Auto-generate a directory listing when no index file is present. This is
    # what makes "just drop a file in" work: a new page shows up in the root
    # listing automatically, with sizes and timestamps.
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # If an index.html exists (root or any subdir), prefer it over the listing.
    index index.html;

    # Compress text payloads.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Pages can change in place (you redeploy the same name with new content),
    # so don't let browsers cache HTML hard. Static assets you reference are
    # served from the same tree and inherit this — fine for a share-link site.
    #
    # Extension-less polish: a request for /foo serves foo.html if it exists, so
    # you can share https://static.mseeks.me/foo instead of /foo.html. You still
    # just drop foo.html into public/ — no per-file config. The .html URL keeps
    # working too. Order matters: exact file, then <name>.html, then a directory.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri.html $uri/ =404;
    }

    # Liveness/readiness target for the k8s probes (hit on the pod, not exposed
    # through the public Ingress).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
