# nginx server for the static site (see Dockerfile). Serves whatever files live
# under public/ — drop a file in there and it's live at /<file>.
#
# There is no build step and no SPA routing: a request maps directly to a file
# on disk. The root "/" auto-lists everything published (autoindex).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Auto-generate a directory listing so a newly dropped file shows up at the
    # root automatically, with sizes and timestamps.
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Compress text payloads.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Pages can change in place (redeploy the same name with new content), so
    # don't let browsers cache HTML hard.
    #
    # Extension-less polish: a request for /foo serves foo.html if it exists, so
    # /foo works as well as /foo.html. Order: exact file, then <name>.html, then
    # a directory listing.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri.html $uri/ =404;
    }

    # Simple health check endpoint.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
